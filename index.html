<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMMXHERO | Dashboard Pro</title>
<link rel="icon" href="logo.ico">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
    :root {
        --primary: #0d6efd;
        --success: #12b886;
        --danger: #fa5252;
        --bg-dark: #1a1b1e;
        --card-bg: #25262b;
        --border: #373a40;
        --text-main: #e5e7eb;
        --text-dim: #909296;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 0; display: flex; flex-direction: column; align-items: center; transition: background 0.3s; }

    /* لودر التحميل */
    #loader { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: 0.5s; }
    #loader img { width: 80px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } }

    /* الهيدر المحسن */
    header { width: 100%; background: var(--card-bg); padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .logo-area { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-area img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--primary); }
    .logo-area span { color: #fff; font-size: 22px; font-weight: 800; }
    .logo-area span b { color: var(--primary); }

    .dashboard { width: 100%; max-width: 800px; padding: 20px; flex: 1; }

    /* التبويبات */
    .tabs-header { display: flex; gap: 10px; margin-bottom: 25px; background: var(--card-bg); padding: 6px; border-radius: 15px; border: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 12px; font-weight: 700; transition: 0.3s; font-size: 14px; }
    .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(13, 110, 253, 0.4); }

    .tab-content { display: none; background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.5); margin-bottom: 30px; animation: slideUp 0.4s ease; }
    .tab-content.active { display: block; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* المدخلات */
    label { display: block; margin-bottom: 10px; font-size: 13px; font-weight: 600; color: var(--text-dim); }
    .form-control { width: 100%; margin-bottom: 15px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #141517; color: #fff; font-size: 14px; outline: none; transition: 0.3s; border-right: 4px solid transparent; }
    .form-control:focus { border-color: var(--primary); border-right: 4px solid var(--primary); }

    .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 15px; }
    .btn-main:hover { filter: brightness(1.2); transform: scale(1.01); }

    /* التنبيهات الذكية أسفل التكست أريا */
    .smart-info { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 12px; font-weight: 600; padding: 0 5px; }
    #platformDetect { color: var(--primary); }

    .mode-selector { display: flex; background: #141517; padding: 5px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
    .m-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 10px; font-size: 13px; font-weight: 700; transition: 0.2s; }
    .m-btn.active { background: var(--border); color: white; }

    .drop-box { background: rgba(13, 110, 253, 0.05); border: 2px dashed var(--border); padding: 50px 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
    .drop-box.dragover { border-color: var(--primary); background: rgba(13, 110, 253, 0.1); }

    /* الإحصائيات */
    .stats-box { background: rgba(18, 184, 134, 0.1); border: 1px solid var(--success); padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: center; display: none; animation: fadeIn 0.3s; }
    .stats-box p { color: var(--success); font-size: 13px; font-weight: 700; }

    .action-btns { display: flex; gap: 10px; margin-top: 15px; }
    .btn-success { background: var(--success); flex: 1.5; padding: 14px; border-radius: 12px; color: white; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; }
    .btn-danger { background: var(--danger); flex: 1; padding: 14px; border-radius: 12px; color: white; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; }

    /* الفوتر */
    footer { width: 100%; background: var(--card-bg); padding: 25px; text-align: center; border-top: 1px solid var(--border); margin-top: auto; }
    footer p { color: var(--text-dim); font-size: 13px; }
    footer a { color: var(--primary); text-decoration: none; font-weight: 700; }

    /* التوست */
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #222; border: 1px solid var(--primary); color: white; padding: 12px 30px; border-radius: 50px; display: none; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-size: 14px; font-weight: 600; }
</style>
</head>
<body>

<div id="loader"><img src="logo.ico" alt="Loading"></div>

<header>
    <a href="https://smmxhero.com" class="logo-area">
        <img src="logo.ico" alt="Logo">
        <span>SMMX<b>HERO</b></span>
    </a>
    <div style="font-size: 12px; color: var(--text-dim); font-weight: 700;">PRO DASHBOARD v2.0</div>
</header>

<div class="dashboard" id="main" style="display:none;">
    
    <div class="tabs-header">
        <button class="tab-btn active" id="tab1" onclick="openTab('massTab')">📦 تنسيق الطلبات</button>
        <button class="tab-btn" id="tab2" onclick="openTab('filterTab')">🔍 استخراج الأرقام</button>
    </div>

    <div id="massTab" class="tab-content active">
        <div class="input-group" style="display: flex; gap: 12px;">
            <div style="flex: 1;">
                <label>رقم الخدمة (Service ID)</label>
                <input type="text" id="massService" class="form-control" placeholder="101" oninput="saveS()">
            </div>
            <div style="flex: 1;" id="massFixedQty">
                <label>الكمية</label>
                <input type="number" id="massQty" class="form-control" placeholder="1000">
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13px;">
                <input type="checkbox" id="massRandomCheck" onchange="toggleMassQty()"> توزيع عشوائي للكميات (آمن)
            </label>
        </div>

        <div id="massRandomGroup" style="display: none; gap: 12px; margin-bottom: 20px;">
            <div style="flex: 1;">
                <label>أقل كمية</label>
                <input type="number" id="massMin" class="form-control" placeholder="50">
            </div>
            <div style="flex: 1;">
                <label>أكبر كمية</label>
                <input type="number" id="massMax" class="form-control" placeholder="200">
            </div>
        </div>

        <label>روابط الطلبات</label>
        <textarea id="massLinks" class="form-control" rows="6" placeholder="https://instagram.com/..." oninput="detectPlatforms()"></textarea>
        
        <div class="smart-info">
            <span id="linkCounterLabel">الروابط: 0</span>
            <span id="platformDetect">المنصة: لم يتم التحديد</span>
        </div>

        <button class="btn-main" onclick="runMassFormatter()">🚀 إنشاء الطلبات الجماعية</button>
        
        <div id="massStatsBox" class="stats-box"><p id="massStats"></p></div>

        <textarea id="massResult" class="form-control" rows="5" readonly placeholder="التنسيق الجاهز..."></textarea>

        <div class="action-btns">
            <button class="btn-success" onclick="copyAndRedirect('massResult')">📋 نسخ والذهاب للموقع</button>
            <button class="btn-danger" onclick="clearMass()">🗑️ مسح</button>
        </div>
    </div>

    <div id="filterTab" class="tab-content">
        <div class="mode-selector">
            <button class="m-btn active" id="btnManual" onclick="switchFilterMode('manual')">⌨️ إدخال يدوي</button>
            <button class="m-btn" id="btnImage" onclick="switchFilterMode('image')">📷 من سكرين شوت</button>
        </div>

        <div id="filterImageSection" style="display: none;">
            <div class="drop-box" id="filterDropZone">
                <strong>📸 اسحب الصورة هنا أو اضغط</strong>
                <p style="font-size: 12px; color: var(--text-dim); margin-top: 10px;">أو الصق مباشرة Ctrl+V</p>
                <input type="file" id="filterImgInput" accept="image/*" style="display:none">
            </div>
            <div id="filterOcrStatus" style="text-align:center; color:#facc15; font-size:12px; margin-bottom:15px; display:none;">⏳ جاري فحص الصورة...</div>
        </div>

        <label>النص المراد تنظيفه:</label>
        <textarea id="filterInput" class="form-control" rows="6" placeholder="الصق النص الذي يحتوي على أرقام..."></textarea>

        <div style="display: flex; gap: 12px;">
            <div style="flex: 1;">
                <label>فلترة حسب</label>
                <select id="filterType" class="form-control">
                    <option value="id">رقم الطلب (5 أرقام فأكثر)</option>
                    <option value="all">كل الأرقام</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label>الفاصل</label>
                <select id="filterSep" class="form-control">
                    <option value="&#10;">سطر جديد</option>
                    <option value=",">فاصلة (,)</option>
                </select>
            </div>
        </div>

        <button class="btn-main" onclick="runFilter()">⚡ استخراج الأرقام الصافية</button>
        <div id="filterStatsBox" class="stats-box"><p id="filterStats"></p></div>
        <textarea id="filterResult" class="form-control" rows="5" readonly placeholder="الأرقام النهائية..."></textarea>

        <div class="action-btns">
            <button class="btn-success" onclick="copyValue('filterResult')">📋 نسخ الأرقام</button>
            <button class="btn-danger" onclick="clearFilter()">🗑️ مسح</button>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 جميع الحقوق محفوظة لـ <a href="https://smmxhero.com">SMMXHERO.COM</a></p>
</footer>

<div class="toast" id="toast">تم النسخ ✅</div>

<script>
// --- الدوال الأساسية ---
function openTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

window.onload = () => {
    document.getElementById("massService").value = localStorage.getItem('svc') || "";
    setTimeout(() => { 
        document.getElementById("loader").style.opacity = "0"; 
        setTimeout(() => document.getElementById("loader").style.display = "none", 500);
        document.getElementById("main").style.display = "block"; 
    }, 600); 
};

function saveS() { localStorage.setItem('svc', document.getElementById("massService").value); }

// كشف المنصة تلقائياً
function detectPlatforms() {
    const text = document.getElementById("massLinks").value.toLowerCase();
    const counter = document.getElementById("linkCounterLabel");
    const platform = document.getElementById("platformDetect");
    
    const links = text.split('\n').filter(l => l.trim() !== "").length;
    counter.innerText = `الروابط: ${links}`;

    if (text.includes("instagram")) platform.innerText = "المنصة: Instagram 📸";
    else if (text.includes("tiktok")) platform.innerText = "المنصة: TikTok 🎵";
    else if (text.includes("facebook")) platform.innerText = "المنصة: Facebook 💙";
    else if (text.includes("youtube")) platform.innerText = "المنصة: YouTube 🔴";
    else if (links > 0) platform.innerText = "المنصة: متنوعة/غير معروفة";
    else platform.innerText = "المنصة: لم يتم التحديد";
}

function toggleMassQty() {
    const isRnd = document.getElementById("massRandomCheck").checked;
    document.getElementById("massFixedQty").style.opacity = isRnd ? "0.3" : "1";
    document.getElementById("massRandomGroup").style.display = isRnd ? "flex" : "none";
}

function runMassFormatter() {
    const svc = document.getElementById("massService").value.trim();
    const links = document.getElementById("massLinks").value.split('\n');
    const isRnd = document.getElementById("massRandomCheck").checked;
    const qty = document.getElementById("massQty").value;
    const min = parseInt(document.getElementById("massMin").value);
    const max = parseInt(document.getElementById("massMax").value);

    if(!svc) { showToast("⚠️ أدخل رقم الخدمة أولاً"); return; }
    
    let res = "";
    let count = 0;
    links.forEach(l => {
        const url = l.trim().match(/(https?:\/\/[^\s]+)/i);
        if(url) {
            const finalQty = isRnd ? Math.floor(Math.random()*(max-min+1))+min : qty;
            res += `${svc} | ${url[0]} | ${finalQty}\n`;
            count++;
        }
    });
    document.getElementById("massResult").value = res.trim();
    document.getElementById("massStatsBox").style.display = "block";
    document.getElementById("massStats").innerText = `✨ تم تنسيق ${count} طلب بنجاح!`;
}

async function copyAndRedirect(id) {
    const val = document.getElementById(id).value;
    if(!val) return;
    await navigator.clipboard.writeText(val);
    showToast("📋 تم النسخ! جارٍ توجيهك للموقع...");
    setTimeout(() => {
        window.open("https://smmxhero.com/orders", "_blank");
    }, 1500);
}

function switchFilterMode(mode) {
    const isImg = mode === 'image';
    document.getElementById("filterImageSection").style.display = isImg ? "block" : "none";
    document.getElementById("btnManual").classList.toggle("active", !isImg);
    document.getElementById("btnImage").classList.toggle("active", isImg);
}

// OCR Logic
const fDrop = document.getElementById("filterDropZone");
const fImg = document.getElementById("filterImgInput");
fDrop.onclick = () => fImg.click();
fImg.onchange = (e) => handleOcr(e.target.files[0]);
fDrop.ondragover = (e) => { e.preventDefault(); fDrop.classList.add('dragover'); };
fDrop.ondragleave = () => fDrop.classList.remove('dragover');
fDrop.ondrop = (e) => { e.preventDefault(); fDrop.classList.remove('dragover'); handleOcr(e.dataTransfer.files[0]); };

document.addEventListener('paste', e => {
    if(document.getElementById("btnImage").classList.contains("active")) {
        const item = e.clipboardData.items[0];
        if(item && item.type.includes('image')) handleOcr(item.getAsFile());
    }
});

async function handleOcr(file) {
    if(!file) return;
    const st = document.getElementById("filterOcrStatus");
    st.style.display = "block";
    try {
        const r = await Tesseract.recognize(file, 'eng');
        document.getElementById("filterInput").value = r.data.text;
        st.innerText = "✅ اكتمل الفحص!";
        setTimeout(() => st.style.display="none", 2000);
    } catch(e) { showToast("❌ فشل التحليل"); st.style.display="none"; }
}

function runFilter() {
    const input = document.getElementById("filterInput").value;
    const type = document.getElementById("filterType").value;
    const sep = document.getElementById("filterSep").value;
    let nums = input.match(/\d+/g);
    if(!nums) { showToast("⚠️ لا توجد أرقام"); return; }
    let filtered = (type === "id") ? nums.filter(n => n.length >= 5) : nums;
    let unique = [...new Set(filtered)];
    document.getElementById("filterResult").value = unique.join(sep);
    document.getElementById("filterStatsBox").style.display = "block";
    document.getElementById("filterStats").innerText = `✅ تم استخراج ${unique.length} رقم.`;
}

async function copyValue(id) {
    const val = document.getElementById(id).value;
    if(!val) return;
    await navigator.clipboard.writeText(val);
    showToast("📋 تم النسخ!");
}

function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg; t.style.display = "block";
    setTimeout(()=> t.style.display="none", 2500);
}

function clearMass() {
    document.getElementById("massLinks").value = "";
    document.getElementById("massResult").value = "";
    document.getElementById("massStatsBox").style.display = "none";
    detectPlatforms();
}

function clearFilter() {
    document.getElementById("filterInput").value = "";
    document.getElementById("filterResult").value = "";
    document.getElementById("filterStatsBox").style.display = "none";
}
</script>
</body>
</html>
