<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMMXHERO | Smart Dashboard</title>
<link rel="icon" href="logo.ico">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
    :root {
        --primary: #0d6efd;
        --success: #12b886;
        --danger: #fa5252;
        --bg-dark: #1a1b1e;
        --card-bg: #25262b;
        --border: #373a40;
        --text-main: #e5e7eb;
        --text-dim: #909296;
        --input-bg: #141517;
    }

    .light-mode {
        --bg-dark: #f8f9fa;
        --card-bg: #ffffff;
        --border: #dee2e6;
        --text-main: #212529;
        --text-dim: #6c757d;
        --input-bg: #f1f3f5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }

    header { width: 100%; background: var(--card-bg); padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
    .logo-area { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-area img { width: 35px; border-radius: 50%; }
    .logo-area span { color: var(--text-main); font-size: 18px; font-weight: 800; }
    .logo-area span b { color: var(--primary); }

    .theme-toggle { background: var(--border); border: none; padding: 8px 15px; border-radius: 50px; cursor: pointer; color: var(--text-main); font-size: 12px; font-weight: 700; }

    .dashboard { width: 100%; max-width: 800px; padding: 20px; flex: 1; }

    .tabs-header { display: flex; gap: 8px; margin-bottom: 25px; background: var(--card-bg); padding: 6px; border-radius: 14px; border: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 14px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 10px; font-weight: 800; font-size: 15px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .tab-btn.active { background: var(--primary) !important; color: white !important; box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3); }

    .tab-content { display: none; background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--border); animation: slideUp 0.4s ease; }
    .tab-content.active { display: block; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .form-control { width: 100%; margin-bottom: 15px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text-main); font-size: 14px; outline: none; }
    label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: var(--text-dim); }

    .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }

    .mode-selector { display: flex; background: var(--input-bg); padding: 5px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); gap: 5px; }
    .m-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 10px; font-size: 13px; font-weight: 700; }
    .m-btn.active { background: var(--card-bg); color: var(--text-main); box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid var(--border); }

    .drop-box { background: rgba(13, 110, 253, 0.05); border: 2px dashed var(--border); padding: 40px; border-radius: 15px; text-align: center; margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
    .drop-box.dragover { background: rgba(13, 110, 253, 0.15); border-color: var(--primary); }

    .action-btns { display: flex; gap: 10px; margin-top: 15px; }
    .btn-success { background: var(--success); flex: 1.5; padding: 14px; border-radius: 12px; color: white; font-weight: 700; border: none; cursor: pointer; }
    .btn-danger { background: var(--danger); flex: 1; padding: 14px; border-radius: 12px; color: white; font-weight: 700; border: none; cursor: pointer; }

    .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; transition: 0.3s; text-decoration: none; font-size: 30px; }
    .whatsapp-float span { position: absolute; right: 70px; background: #25d366; padding: 5px 15px; border-radius: 10px; font-size: 12px; font-weight: 700; white-space: nowrap; opacity: 0; transition: 0.3s; }
    .whatsapp-float:hover span { opacity: 1; }

    .stats-box { background: rgba(18, 184, 134, 0.1); border: 1px solid var(--success); padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: center; display: none; }
    
    #loader { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    #loader img { width: 60px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 50% { opacity: 0.5; transform: scale(1.1); } }

    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #222; border: 1px solid var(--primary); color: white; padding: 12px 30px; border-radius: 50px; display: none; z-index: 10000; font-size: 14px; font-weight: 700; }
</style>
</head>
<body>

<div id="loader"><img src="logo.ico" alt="Logo"></div>

<header>
    <a href="https://smmxhero.com" class="logo-area">
        <img src="logo.ico" alt="Logo">
        <span>SMMX<b>HERO</b></span>
    </a>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 الوضع الليلي</button>
</header>

<div class="dashboard" id="main" style="display:none;">
    <div class="tabs-header">
        <button class="tab-btn active" id="tab1" onclick="openTab('massTab')">📦 طلبات مجمعة (Mass)</button>
        <button class="tab-btn" id="tab2" onclick="openTab('filterTab')">🔍 استخراج وتنسيق</button>
    </div>

    <div id="massTab" class="tab-content active">
        <div style="display: flex; gap: 12px;">
            <div style="flex: 1.2;"><label>رقم الخدمة</label><input type="text" id="massService" class="form-control" placeholder="101" oninput="saveS()"></div>
            <div style="flex: 1;" id="massFixedQty"><label>الكمية</label><input type="number" id="massQty" class="form-control" placeholder="1000"></div>
        </div>
        <label style="cursor: pointer;"><input type="checkbox" id="massRandomCheck" onchange="toggleMassQty()"> توزيع عشوائي (آمن)</label>
        <div id="massRandomGroup" style="display: none; gap: 12px; margin: 15px 0;">
            <div style="flex: 1;"><label>أقل كمية</label><input type="number" id="massMin" class="form-control" placeholder="50"></div>
            <div style="flex: 1;"><label>أكبر كمية</label><input type="number" id="massMax" class="form-control" placeholder="200"></div>
        </div>
        <textarea id="massLinks" class="form-control" rows="6" placeholder="رابط في كل سطر..."></textarea>
        <button class="btn-main" onclick="runMassFormatter()">🚀 تنسيق الطلبات</button>
        <div id="massStatsBox" class="stats-box"><p id="massStats"></p></div>
        <textarea id="massResult" class="form-control" rows="5" readonly></textarea>
        <div class="action-btns">
            <button class="btn-success" onclick="copyAndRedirect('massResult')">📋 نسخ وافتح الموقع</button>
            <button class="btn-danger" onclick="clearMass()">🗑️ مسح</button>
        </div>
    </div>

    <div id="filterTab" class="tab-content">
        <div class="mode-selector">
            <button class="m-btn active" id="btnManual" onclick="switchFilterMode('manual')">⌨️ يدوي</button>
            <button class="m-btn" id="btnImage" onclick="switchFilterMode('image')">📷 صورة / سحب</button>
        </div>
        <div id="filterImageSection" style="display: none;">
            <div class="drop-box" id="dropZone" onclick="document.getElementById('filterImgInput').click()">
                <strong>📸 اضغط أو اسحب الصورة هنا</strong>
                <p style="font-size: 12px; color: var(--text-dim); margin-top: 10px;">أو استخدم Ctrl+V للصق</p>
                <input type="file" id="filterImgInput" accept="image/*" style="display:none" onchange="handleOcr(this.files[0])">
            </div>
        </div>
        <textarea id="filterInput" class="form-control" rows="6" placeholder="الصق النص هنا..."></textarea>
        <div style="display: flex; gap: 12px;">
            <div style="flex: 1;"><label>التصفية</label><select id="filterType" class="form-control"><option value="id">أرقام طلبات (5+)</option><option value="all">كل الأرقام</option></select></div>
            <div style="flex: 1;"><label>الفاصل</label><input type="text" class="form-control" value="فاصلة ( , )" readonly style="text-align: center; opacity: 0.7;"></div>
        </div>
        <button class="btn-main" onclick="runFilter()">⚡ استخراج بالفاصلة</button>
        <div id="filterStatsBox" class="stats-box"><p id="filterStats"></p></div>
        <textarea id="filterResult" class="form-control" rows="5" readonly></textarea>
        <div class="action-btns"><button class="btn-success" onclick="copyValue('filterResult')">📋 نسخ</button><button class="btn-danger" onclick="clearFilter()">🗑️ مسح</button></div>
    </div>
</div>

<a href="https://wa.me/201159017393" class="whatsapp-float" target="_blank"><span>الدعم الفني</span>📞</a>

<div class="toast" id="toast"></div>

<script>
    function toggleTheme() {
        document.body.classList.toggle("light-mode");
        const isL = document.body.classList.contains("light-mode");
        document.getElementById("themeBtn").innerText = isL ? "☀️ النهاري" : "🌙 الليلي";
        localStorage.setItem("theme", isL ? "light" : "dark");
    }

    window.onload = () => {
        if(localStorage.getItem("theme") === "light") toggleTheme();
        document.getElementById("massService").value = localStorage.getItem('svc') || "";
        setTimeout(() => { document.getElementById("loader").style.display = "none"; document.getElementById("main").style.display = "block"; }, 500);
    };

    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function switchFilterMode(mode) {
        const isImg = mode === 'image';
        document.getElementById("filterImageSection").style.display = isImg ? "block" : "none";
        document.getElementById("btnManual").classList.toggle("active", !isImg);
        document.getElementById("btnImage").classList.toggle("active", isImg);
    }

    // --- ميزات السحب والإفلات واللصق ---
    const dropZone = document.getElementById('dropZone');
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleOcr(e.dataTransfer.files[0]); };

    document.addEventListener('paste', (e) => {
        if (document.getElementById('btnImage').classList.contains('active')) {
            const item = e.clipboardData.items[0];
            if (item && item.type.includes('image')) handleOcr(item.getAsFile());
        }
    });

    async function handleOcr(file) {
        if(!file) return;
        showToast("⏳ جاري التحليل...");
        try {
            const r = await Tesseract.recognize(file, 'eng');
            document.getElementById("filterInput").value = r.data.text;
            showToast("✅ تم الاستخراج");
        } catch(e) { showToast("❌ فشل التحليل"); }
    }

    function toggleMassQty() {
        const isR = document.getElementById("massRandomCheck").checked;
        document.getElementById("massFixedQty").style.opacity = isR ? "0.3" : "1";
        document.getElementById("massRandomGroup").style.display = isR ? "flex" : "none";
    }

    function runMassFormatter() {
        const svc = document.getElementById("massService").value.trim();
        const links = document.getElementById("massLinks").value.split('\n');
        const isR = document.getElementById("massRandomCheck").checked;
        const qty = document.getElementById("massQty").value;
        const min = parseInt(document.getElementById("massMin").value);
        const max = parseInt(document.getElementById("massMax").value);
        if(!svc) { showToast("⚠️ رقم الخدمة مطلوب"); return; }
        let res = ""; let c = 0;
        links.forEach(l => {
            const url = l.trim().match(/(https?:\/\/[^\s]+)/i);
            if(url) {
                const fQty = isR ? Math.floor(Math.random()*(max-min+1))+min : qty;
                res += `${svc} | ${url[0]} | ${fQty}\n`; c++;
            }
        });
        document.getElementById("massResult").value = res.trim();
        document.getElementById("massStatsBox").style.display = "block";
        document.getElementById("massStats").innerText = `✨ تم تنسيق ${c} طلب!`;
    }

    function runFilter() {
        const input = document.getElementById("filterInput").value;
        const type = document.getElementById("filterType").value;
        let nums = input.match(/\d+/g);
        if(!nums) { showToast("⚠️ لا توجد أرقام"); return; }
        let filtered = (type === "id") ? nums.filter(n => n.length >= 5) : nums;
        let unique = [...new Set(filtered)];
        document.getElementById("filterResult").value = unique.join(",");
        document.getElementById("filterStatsBox").style.display = "block";
        document.getElementById("filterStats").innerText = `✅ استخراج ${unique.length} رقم.`;
    }

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg; t.style.display = "block";
        setTimeout(()=> t.style.display="none", 2500);
    }

    async function copyValue(id) {
        const v = document.getElementById(id).value;
        if(!v) return;
        await navigator.clipboard.writeText(v);
        showToast("📋 تم النسخ!");
    }

    async function copyAndRedirect(id) {
        await copyValue(id);
        setTimeout(() => window.open("https://smmxhero.com/orders", "_blank"), 800);
    }

    function clearMass() { document.getElementById("massLinks").value = ""; document.getElementById("massResult").value = ""; }
    function clearFilter() { document.getElementById("filterInput").value = ""; document.getElementById("filterResult").value = ""; }
    function saveS() { localStorage.setItem('svc', document.getElementById("massService").value); }
</script>
</body>
</html>
