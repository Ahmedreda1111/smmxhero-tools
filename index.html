<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMMXHERO.COM | Bulk Tool</title>

<link rel="icon" href="logo.ico">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Cairo', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Loader */
#loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #020617;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#loader img {
    width: 100px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); opacity: 0.6; }
}

/* Container */
.container {
    width: 100%;
    max-width: 600px;
    background: #0f172a;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 0 50px rgba(37,99,235,0.3);
}

/* Logo */
.logo img {
    width: 140px;
    display: block;
    margin: auto;
    filter: drop-shadow(0 0 30px #3b82f6);
}

.brand {
    text-align: center;
    color: #3b82f6;
    margin-bottom: 10px;
    font-weight: bold;
}

h1 {
    text-align: center;
    margin: 10px 0 20px;
}

textarea {
    width: 100%;
    height: 150px;
    border-radius: 10px;
    border: none;
    padding: 12px;
    background: #020617;
    color: white;
}

select {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, #2563eb, #3b82f6);
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

.copy-btn {
    background: #22c55e;
}

/* CTA */
.cta button {
    background: linear-gradient(90deg,#f59e0b,#facc15);
}

/* Result */
.result {
    margin-top: 15px;
    background: #020617;
    padding: 12px;
    border-radius: 10px;
    min-height: 40px;

    /* 🔥 حل مشكلة السطر */
    word-break: break-all;
    overflow-wrap: break-word;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #22c55e;
    padding: 10px 20px;
    border-radius: 10px;
    display: none;
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<!-- Loader -->
<div id="loader">
    <img src="logo.ico">
</div>

<div class="container" id="main" style="display:none;">

    <div class="logo">
        <img src="logo.ico">
    </div>

    <div class="brand">smmxhero.com</div>

    <h1>Bulk Order Formatter</h1>

    <textarea id="input" placeholder="حط الأوردارات هنا (أي فاصل: سطر / مسافة / ,)"></textarea>

    <select id="separator">
        <option value=",">Comma (,)</option>
        <option value="|">Pipe (|)</option>
        <option value=";">Semicolon (;)</option>
    </select>

    <button onclick="convert()">⚡ Convert</button>

    <div class="result" id="result"></div>

    <button class="copy-btn" onclick="copy()">📋 Copy</button>

    <!-- CTA -->
    <div id="ctaBox" class="cta" style="display:none; text-align:center; margin-top:15px;">
        <a href="https://smmxhero.com" target="_blank">
            <button>🚀 اطلب من smmxhero</button>
        </a>
    </div>

    <div class="footer">
        © 2026 smmxhero.com
    </div>

</div>

<div class="toast" id="toast">Copied ✅</div>

<script>
// Loader
window.onload = () => {
    setTimeout(() => {
        loader.style.display = "none";
        main.style.display = "block";
    }, 1500);
};

// 🔥 Convert + Remove duplicates (مظبوط 100%)
function convert() {
    let input = document.getElementById("input").value;

    let val = input
        .split(/[\s,]+/) // يفصل بأي فاصل
        .map(x => x.trim())
        .filter(x => x !== "");

    let unique = [...new Set(val)];

    let output = unique.join(document.getElementById("separator").value);

    document.getElementById("result").innerText = output;

    if(output){
        navigator.clipboard.writeText(output);
        showToast();
    }

    document.getElementById("ctaBox").style.display = "block";
}

// Copy
function copy() {
    navigator.clipboard.writeText(document.getElementById("result").innerText);
    showToast();
}

function showToast(){
    toast.style.display = "block";
    setTimeout(()=> toast.style.display="none",1500);
}

/* حماية */
document.addEventListener("contextmenu", e => e.preventDefault());

document.onkeydown = function(e) {
    if (e.keyCode == 123) return false;
    if (e.ctrlKey && e.shiftKey && e.keyCode == 73) return false;
    if (e.ctrlKey && e.shiftKey && e.keyCode == 74) return false;
    if (e.ctrlKey && e.keyCode == 85) return false;
};

setInterval(function() {
    let width = window.outerWidth - window.innerWidth;
    let height = window.outerHeight - window.innerHeight;
    if (width > 200 || height > 200) {
        document.body.innerHTML = "<h1 style='color:red;text-align:center;margin-top:20%;'>🚫 ممنوع فتح أدوات المطور</h1>";
    }
}, 1000);
</script>

</body>
</html>
