<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMMXHERO | Pro Dashboard</title>
<link rel="icon" href="logo.ico">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
    :root {
        --primary: #0d6efd;
        --success: #198754;
        --danger: #dc3545;
        --bg-dark: #1a1b1e;
        --card-bg: #25262b;
        --border: #373a40;
        --text-main: #e5e7eb;
        --text-dim: #909296;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 20px; display: flex; justify-content: center; }

    #loader { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    #loader img { width: 80px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } }

    .dashboard { width: 100%; max-width: 800px; }

    /* التبويبات */
    .tabs-header { display: flex; gap: 10px; margin-bottom: 20px; background: var(--card-bg); padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 8px; font-weight: 600; transition: 0.3s; }
    .tab-btn.active { background: var(--primary); color: white; }

    .tab-content { display: none; background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.3); animation: fadeIn 0.4s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .brand-title { text-align: center; margin-bottom: 20px; font-size: 20px; font-weight: 700; }

    /* العناصر المشتركة */
    label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-dim); }
    .form-control { width: 100%; margin-bottom: 15px; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); background: #141517; color: #c1c2c5; font-size: 14px; outline: none; }
    .btn-main { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
    .btn-main:hover { background: #0b5ed7; }

    /* خيارات الكمية العشوائية */
    .qty-type-toggle { margin-bottom: 15px; font-size: 13px; color: var(--text-dim); }
    .qty-type-toggle label { cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }

    /* ستايل المبدل للمود (يدوي / صورة) */
    .mode-selector { display: flex; background: #141517; padding: 5px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); }
    .m-btn { flex: 1; padding: 8px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 6px; font-size: 13px; font-weight: 600; }
    .m-btn.active { background: var(--border); color: white; }

    /* منطقة الرفع */
    .drop-box { background: rgba(13, 110, 253, 0.05); border: 2px dashed var(--border); padding: 35px; border-radius: 8px; text-align: center; margin-bottom: 15px; cursor: pointer; }
    .drop-box.dragover { border-color: var(--primary); background: rgba(13, 110, 253, 0.1); }

    .stats { text-align: center; color: var(--success); font-size: 14px; font-weight: 600; margin: 10px 0; min-height: 20px; }
    .action-btns { display: flex; gap: 10px; }
    .btn-success { background: var(--success); flex: 1; padding: 12px; border-radius: 8px; color: white; font-weight: 600; border: none; cursor: pointer; }
    .btn-danger { background: var(--danger); flex: 1; padding: 12px; border-radius: 8px; color: white; font-weight: 600; border: none; cursor: pointer; }

    .toast { position: fixed; bottom: 20px; left: 20px; background: var(--success); color: white; padding: 12px 25px; border-radius: 8px; display: none; z-index: 1000; }
</style>
</head>
<body>

<div id="loader"><img src="logo.ico" alt="Loading"></div>

<div class="dashboard" id="main" style="display:none;">
    
    <div class="tabs-header">
        <button class="tab-btn active" onclick="openTab('massTab')">📦 منسق الطلبات</button>
        <button class="tab-btn" onclick="openTab('filterTab')">🔍 تصفية الأرقام</button>
    </div>

    <div id="massTab" class="tab-content active">
        <div class="brand-title">SMMXHERO | مُنسّق الطلبات الجماعية</div>
        
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>رقم الخدمة (ID)</label>
                <input type="text" id="massService" class="form-control" placeholder="101">
            </div>
            <div style="flex: 1;" id="massFixedQty">
                <label>الكمية</label>
                <input type="number" id="massQty" class="form-control" placeholder="1000">
            </div>
        </div>

        <div class="qty-type-toggle">
            <label><input type="checkbox" id="massRandomCheck" onchange="toggleMassQty()"> توزيع الكميات عشوائياً (مستحسن)</label>
        </div>

        <div id="massRandomGroup" style="display: none; gap: 10px; margin-bottom: 15px;">
            <div style="flex: 1;">
                <label>الحد الأدنى</label>
                <input type="number" id="massMin" class="form-control" placeholder="50">
            </div>
            <div style="flex: 1;">
                <label>الحد الأقصى</label>
                <input type="number" id="massMax" class="form-control" placeholder="150">
            </div>
        </div>

        <label>روابط الطلبات (واحد لكل سطر)</label>
        <textarea id="massLinks" class="form-control" rows="5" placeholder="https://..."></textarea>
        
        <button class="btn-main" onclick="runMassFormatter()">⚡ توليد الطلبات الجماعية</button>
        <div id="massStats" class="stats"></div>
        <textarea id="massResult" class="form-control" rows="5" readonly placeholder="النتيجة النهائية..."></textarea>

        <div class="action-btns">
            <button class="btn-success" onclick="copyValue('massResult')">📋 نسخ</button>
            <button class="btn-danger" onclick="clearMass()">🗑️ مسح</button>
        </div>
    </div>

    <div id="filterTab" class="tab-content">
        <div class="brand-title">SMMXHERO | فلتر وتصفية الأرقام</div>

        <label>طريقة الإدخال:</label>
        <div class="mode-selector">
            <button class="m-btn active" id="btnManual" onclick="switchFilterMode('manual')">⌨️ يدوي</button>
            <button class="m-btn" id="btnImage" onclick="switchFilterMode('image')">📷 من صورة</button>
        </div>

        <div id="filterImageSection" style="display: none;">
            <div class="drop-box" id="filterDropZone">
                <strong>📷 اسحب الصورة أو اضغط أو Ctrl+V</strong>
                <input type="file" id="filterImgInput" accept="image/*" style="display:none">
            </div>
            <div id="filterOcrStatus" style="text-align:center; color:#facc15; font-size:12px; margin-bottom:10px; display:none;">⏳ جاري التحليل...</div>
        </div>

        <label id="filterLabel">النص المراد تصفيته:</label>
        <textarea id="filterInput" class="form-control" rows="5" placeholder="ضع النص هنا..."></textarea>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>نوع الفلتر</label>
                <select id="filterType" class="form-control">
                    <option value="id">أرقام الطلبات (5+ خانات)</option>
                    <option value="all">جميع الأرقام</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label>الفاصل</label>
                <select id="filterSep" class="form-control">
                    <option value=",">فاصلة ( , )</option>
                    <option value="&#10;">سطر جديد</option>
                </select>
            </div>
        </div>

        <button class="btn-main" onclick="runFilter()">⚡ تصفية واستخراج</button>
        <div id="filterStats" class="stats"></div>
        <textarea id="filterResult" class="form-control" rows="5" readonly placeholder="النتائج الصافية..."></textarea>

        <div class="action-btns">
            <button class="btn-success" onclick="copyValue('filterResult')">📋 نسخ</button>
            <button class="btn-danger" onclick="clearFilter()">🗑️ مسح</button>
        </div>
    </div>

</div>

<div class="toast" id="toast">تم النسخ ✅</div>

<script>
// --- التبويبات ---
function openTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

window.onload = () => { setTimeout(() => { 
    document.getElementById("loader").style.display = "none"; 
    document.getElementById("main").style.display = "block"; 
}, 500); };

// --- منطق الأداة الأولى (Mass Order) ---
function toggleMassQty() {
    const isRnd = document.getElementById("massRandomCheck").checked;
    document.getElementById("massFixedQty").style.display = isRnd ? "none" : "block";
    document.getElementById("massRandomGroup").style.display = isRnd ? "flex" : "none";
}

function runMassFormatter() {
    const service = document.getElementById("massService").value.trim();
    const links = document.getElementById("massLinks").value.split('\n');
    const isRnd = document.getElementById("massRandomCheck").checked;
    const qty = document.getElementById("massQty").value;
    const min = parseInt(document.getElementById("massMin").value);
    const max = parseInt(document.getElementById("massMax").value);

    if(!service) { alert("أدخل رقم الخدمة"); return; }
    
    let res = "";
    let count = 0;
    links.forEach(line => {
        const urlMatch = line.match(/(https?:\/\/[^\s]+)/i);
        if(urlMatch) {
            const finalQty = isRnd ? Math.floor(Math.random()*(max-min+1))+min : qty;
            res += `${service} | ${urlMatch[0]} | ${finalQty}\n`;
            count++;
        }
    });
    document.getElementById("massResult").value = res.trim();
    document.getElementById("massStats").innerText = `✅ تم تنسيق ${count} طلب.`;
}

function clearMass() {
    document.getElementById("massService").value = "";
    document.getElementById("massQty").value = "";
    document.getElementById("massLinks").value = "";
    document.getElementById("massResult").value = "";
    document.getElementById("massStats").innerText = "";
}

// --- منطق الأداة الثانية (Filter) ---
function switchFilterMode(mode) {
    const isImg = (mode === 'image');
    document.getElementById("filterImageSection").style.display = isImg ? "block" : "none";
    document.getElementById("btnManual").classList.toggle("active", !isImg);
    document.getElementById("btnImage").classList.toggle("active", isImg);
    document.getElementById("filterLabel").innerText = isImg ? "النص المستخرج من الصورة:" : "النص المراد تصفيته:";
}

const fDropZone = document.getElementById("filterDropZone");
const fImgInp = document.getElementById("filterImgInput");

fDropZone.onclick = () => fImgInp.click();
fImgInp.onchange = (e) => handleOcr(e.target.files[0]);

fDropZone.ondragover = (e) => { e.preventDefault(); fDropZone.classList.add('dragover'); };
fDropZone.ondragleave = () => fDropZone.classList.remove('dragover');
fDropZone.ondrop = (e) => { e.preventDefault(); fDropZone.classList.remove('dragover'); handleOcr(e.dataTransfer.files[0]); };

document.addEventListener('paste', e => {
    if(document.getElementById("btnImage").classList.contains("active")) {
        const item = e.clipboardData.items[0];
        if(item && item.type.includes('image')) handleOcr(item.getAsFile());
    }
});

async function handleOcr(file) {
    if(!file) return;
    const st = document.getElementById("filterOcrStatus");
    st.style.display = "block";
    try {
        const r = await Tesseract.recognize(file, 'eng');
        document.getElementById("filterInput").value = r.data.text;
        st.innerText = "✅ اكتمل التحليل!";
        setTimeout(()=> st.style.display="none", 2000);
    } catch(e) { alert("خطأ في القراءة"); st.style.display="none"; }
}

function runFilter() {
    const input = document.getElementById("filterInput").value;
    const type = document.getElementById("filterType").value;
    const sep = document.getElementById("filterSep").value;
    let nums = input.match(/\d+/g);
    if(!nums) { alert("لا توجد أرقام"); return; }
    let filtered = (type === "id") ? nums.filter(n => n.length >= 5) : nums;
    let unique = [...new Set(filtered)];
    document.getElementById("filterResult").value = unique.join(sep);
    document.getElementById("filterStats").innerText = `✅ تم تصفية ${unique.length} رقم.`;
}

function clearFilter() {
    document.getElementById("filterInput").value = "";
    document.getElementById("filterResult").value = "";
    document.getElementById("filterStats").innerText = "";
}

// --- وظائف عامة ---
async function copyValue(id) {
    const v = document.getElementById(id).value;
    if(!v) return;
    await navigator.clipboard.writeText(v);
    const t = document.getElementById("toast");
    t.style.display = "block";
    setTimeout(()=> t.style.display="none", 2000);
}
</script>
</body>
</html>
