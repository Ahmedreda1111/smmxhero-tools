<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMMXHERO | Smart Dashboard</title>
<link rel="icon" href="logo.ico">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
    :root {
        --primary: #0d6efd;
        --success: #198754;
        --danger: #dc3545;
        --bg-dark: #1a1b1e;
        --card-bg: #25262b;
        --border: #373a40;
        --text-main: #e5e7eb;
        --text-dim: #909296;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 20px; display: flex; justify-content: center; }

    #loader { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    #loader img { width: 80px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } }

    .dashboard { width: 100%; max-width: 800px; }

    .tabs-header { display: flex; gap: 10px; margin-bottom: 20px; background: var(--card-bg); padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 8px; font-weight: 600; transition: 0.3s; }
    .tab-btn.active { background: var(--primary); color: white; }

    .tab-content { display: none; background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.3); animation: fadeIn 0.4s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .brand-title { text-align: center; margin-bottom: 20px; font-size: 20px; font-weight: 700; }

    label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-dim); }
    .form-control { width: 100%; margin-bottom: 15px; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); background: #141517; color: #c1c2c5; font-size: 14px; outline: none; }
    
    .btn-main { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
    
    /* ستايل اختيار طريقة الإدخال */
    .input-mode-selector {
        display: flex;
        background: #141517;
        padding: 5px;
        border-radius: 8px;
        margin-bottom: 20px;
        border: 1px solid var(--border);
    }
    .mode-btn {
        flex: 1;
        padding: 8px;
        border: none;
        background: transparent;
        color: var(--text-dim);
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        border-radius: 6px;
        transition: 0.2s;
    }
    .mode-btn.active { background: var(--border); color: var(--text-main); }

    .ocr-upload-box { 
        background: rgba(13, 110, 253, 0.05); 
        border: 2px dashed var(--border); 
        padding: 40px 15px; 
        border-radius: 8px; 
        text-align: center; 
        margin-bottom: 15px; 
        cursor: pointer; 
        transition: 0.3s;
    }
    .ocr-upload-box.dragover { border-color: var(--primary); background: rgba(13, 110, 253, 0.1); }

    #status { font-size: 12px; color: #facc15; text-align: center; margin-bottom: 10px; display: none; }
    .stats-text { text-align: center; color: var(--success); font-size: 14px; font-weight: 600; margin: 10px 0; }
    
    .action-buttons { display: flex; gap: 10px; }
    .btn-success { background: var(--success); flex: 1; padding: 12px; border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: 600; }
    .btn-danger { background: var(--danger); flex: 1; padding: 12px; border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: 600; }

    .toast { position: fixed; bottom: 20px; left: 20px; background: var(--success); color: white; padding: 12px 25px; border-radius: 8px; display: none; }
</style>
</head>
<body>

<div id="loader"><img src="logo.ico" alt="Loading"></div>

<div class="dashboard" id="main" style="display:none;">
    
    <div class="tabs-header">
        <button class="tab-btn active" onclick="openTab('massOrder')">📦 منسق الطلبات الجماعية</button>
        <button class="tab-btn" onclick="openTab('filterTool')">🔍 فلتر ومنظف البيانات</button>
    </div>

    <div id="massOrder" class="tab-content active">
        <div class="brand-title">SMMXHERO | Mass Order Formatter</div>
        <div class="input-group" style="display: flex; gap:10px;">
            <div style="flex: 1;">
                <label>رقم الخدمة</label>
                <input type="text" id="service" class="form-control" placeholder="101">
            </div>
            <div style="flex: 1;">
                <label>الكمية</label>
                <input type="number" id="quantity" class="form-control" placeholder="1000">
            </div>
        </div>
        <label>الروابط</label>
        <textarea id="links" class="form-control" rows="6" placeholder="رابط واحد في كل سطر..."></textarea>
        <button class="btn-main" onclick="generateMass()">⚡ توليد التنسيق النهائي</button>
        <textarea id="massResult" class="form-control" rows="5" readonly placeholder="النتيجة هنا..."></textarea>
        <div class="action-buttons">
            <button class="btn-success" onclick="copyText('massResult')">📋 نسخ</button>
            <button class="btn-danger" onclick="clearMass()">🗑️ مسح</button>
        </div>
    </div>

    <div id="filterTool" class="tab-content">
        <div class="brand-title">SMMXHERO | أداة تصفية البيانات</div>

        <label>اختر طريقة الإدخال:</label>
        <div class="input-mode-selector">
            <button class="mode-btn active" id="manualBtn" onclick="setMode('manual')">⌨️ إدخال يدوي</button>
            <button class="mode-btn" id="imageBtn" onclick="setMode('image')">📷 استخراج من صورة</button>
        </div>

        <div id="imageModeArea" style="display: none;">
            <div class="ocr-upload-box" id="dropZone">
                <strong>📷 اسحب الصورة هنا أو اضغط للاختيار</strong>
                <p style="font-size: 12px; color: var(--text-dim); margin-top: 5px;">يدعم اللصق المباشر Ctrl + V</p>
                <input type="file" id="imageInput" accept="image/*" style="display:none">
            </div>
            <div id="status">⏳ جاري تحليل الصورة...</div>
        </div>

        <div id="manualModeArea">
            <label id="inputLabel">أدخل النص المراد تنظيفه:</label>
            <textarea id="filterInput" class="form-control" rows="6" placeholder="ضع النص هنا..."></textarea>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <div style="flex: 1;">
                <label>نوع التصفية</label>
                <select id="filterType" class="form-control">
                    <option value="id">أرقام الطلبات فقط (5+ خانات)</option>
                    <option value="all">جميع الأرقام الموجودة</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label>الفاصل</label>
                <select id="separator" class="form-control">
                    <option value=",">فاصلة ( , )</option>
                    <option value="&#10;">سطر جديد</option>
                </select>
            </div>
        </div>

        <button class="btn-main" onclick="processFilter()">⚡ تنظيف البيانات المستلمة</button>
        
        <div id="filterStats" class="stats-text"></div>
        <textarea id="filterResult" class="form-control" rows="5" readonly placeholder="الأرقام المصفاة ستظهر هنا..."></textarea>

        <div class="action-buttons">
            <button class="btn-success" onclick="copyText('filterResult')">📋 نسخ</button>
            <button class="btn-danger" onclick="clearFilter()">🗑️ مسح</button>
        </div>
    </div>

</div>

<div class="toast" id="toast">تم النسخ بنجاح ✅</div>

<script>
// --- التنقل والتبويبات ---
function openTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
}

// --- نظام تبديل وضع الإدخال ---
function setMode(mode) {
    const manualArea = document.getElementById('manualModeArea');
    const imageArea = document.getElementById('imageModeArea');
    const manualBtn = document.getElementById('manualBtn');
    const imageBtn = document.getElementById('imageBtn');
    const inputLabel = document.getElementById('inputLabel');

    if (mode === 'manual') {
        imageArea.style.display = 'none';
        manualArea.style.display = 'block';
        manualBtn.classList.add('active');
        imageBtn.classList.remove('active');
        inputLabel.innerText = "أدخل النص المراد تنظيفه:";
    } else {
        imageArea.style.display = 'block';
        manualArea.style.display = 'block'; // نتركه مفتوحاً ليرى المستخدم النص المستخرج
        manualBtn.classList.remove('active');
        imageBtn.classList.add('active');
        inputLabel.innerText = "النص المستخرج من الصورة (يمكنك التعديل عليه):";
    }
}

window.onload = () => { setTimeout(() => { 
    document.getElementById("loader").style.display = "none"; 
    document.getElementById("main").style.display = "block"; 
}, 500); };

// دالة النسخ
async function copyText(id) {
    const val = document.getElementById(id).value;
    if(!val) return;
    await navigator.clipboard.writeText(val);
    const t = document.getElementById("toast");
    t.style.display = "block";
    setTimeout(()=> t.style.display="none", 2000);
}

// منسق الطلبات الجماعية
function generateMass() {
    const service = document.getElementById("service").value.trim();
    const qty = document.getElementById("quantity").value.trim();
    const links = document.getElementById("links").value.split('\n');
    let res = "";
    links.forEach(l => {
        const url = l.match(/(https?:\/\/[^\s]+)/i);
        if(url) res += `${service} | ${url[0]} | ${qty}\n`;
    });
    document.getElementById("massResult").value = res.trim();
}

function clearMass() {
    document.getElementById("service").value = "";
    document.getElementById("quantity").value = "";
    document.getElementById("links").value = "";
    document.getElementById("massResult").value = "";
}

// الفلتر والمنظف
const dropZone = document.getElementById('dropZone');
const imgInp = document.getElementById('imageInput');

dropZone.onclick = () => imgInp.click();
imgInp.onchange = (e) => handleImg(e.target.files[0]);

dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
dropZone.ondragleave = () => dropZone.classList.remove('dragover');
dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleImg(e.dataTransfer.files[0]); };

document.addEventListener('paste', e => {
    // يعمل اللصق فقط إذا كان المستخدم في وضع الصورة
    if(document.getElementById('imageBtn').classList.contains('active')) {
        const item = e.clipboardData.items[0];
        if(item && item.type.includes('image')) handleImg(item.getAsFile());
    }
});

async function handleImg(file) {
    if(!file) return;
    const status = document.getElementById("status");
    status.style.display = "block";
    status.innerText = "⏳ جاري التحليل...";
    try {
        const res = await Tesseract.recognize(file, 'eng');
        document.getElementById("filterInput").value = res.data.text;
        status.innerText = "✅ تم الاستخراج بنجاح!";
        setTimeout(()=> status.style.display="none", 2000);
    } catch(e) { alert("خطأ في القراءة"); status.style.display="none"; }
}

function processFilter() {
    const input = document.getElementById("filterInput").value;
    const type = document.getElementById("filterType").value;
    const sep = document.getElementById("separator").value;
    
    let nums = input.match(/\d+/g);
    if(!nums) { alert("لم يتم العثور على أرقام"); return; }
    
    let filtered = (type === "id") ? nums.filter(n => n.length >= 5) : nums;
    let unique = [...new Set(filtered)];
    
    document.getElementById("filterResult").value = unique.join(sep);
    document.getElementById("filterStats").innerText = `✅ تم استخراج ${unique.length} رقم.`;
}

function clearFilter() {
    document.getElementById("filterInput").value = "";
    document.getElementById("filterResult").value = "";
    document.getElementById("filterStats").innerText = "";
}
</script>
</body>
</html>
