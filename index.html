<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMMXHERO | Smart Dashboard</title>
<link rel="icon" href="logo.ico">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
    /* المتغيرات الأساسية */
    :root {
        --primary: #0d6efd;
        --success: #12b886;
        --danger: #fa5252;
        --bg-dark: #1a1b1e;
        --card-bg: #25262b;
        --border: #373a40;
        --text-main: #e5e7eb;
        --text-dim: #909296;
        --input-bg: #141517;
    }

    .light-mode {
        --bg-dark: #f8f9fa;
        --card-bg: #ffffff;
        --border: #dee2e6;
        --text-main: #212529;
        --text-dim: #6c757d;
        --input-bg: #f1f3f5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 0; display: flex; flex-direction: column; align-items: center; transition: all 0.3s ease; }

    #loader { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: 0.5s; }
    #loader img { width: 80px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } }

    header { width: 100%; background: var(--card-bg); padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .logo-area { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-area img { width: 35px; height: 35px; border-radius: 50%; }
    .logo-area span { color: var(--text-main); font-size: 20px; font-weight: 800; }
    .logo-area span b { color: var(--primary); }

    .theme-toggle { background: var(--border); border: none; padding: 8px 15px; border-radius: 50px; cursor: pointer; color: var(--text-main); font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; transition: 0.3s; }

    .dashboard { width: 100%; max-width: 800px; padding: 20px; flex: 1; }

    .tabs-header { display: flex; gap: 10px; margin-bottom: 25px; background: var(--card-bg); padding: 6px; border-radius: 15px; border: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 12px; font-weight: 700; transition: 0.3s; }
    .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3); }

    .tab-content { display: none; background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 30px; animation: slideUp 0.4s ease; }
    .tab-content.active { display: block; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    label { display: block; margin-bottom: 10px; font-size: 13px; font-weight: 600; color: var(--text-dim); }
    .form-control { width: 100%; margin-bottom: 15px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text-main); font-size: 14px; outline: none; transition: 0.3s; }
    .form-control:focus { border-color: var(--primary); }

    /* محدد الأنظمة الجديد */
    .mode-selector { display: flex; background: var(--input-bg); padding: 5px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); gap: 5px; }
    .m-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 10px; font-size: 12px; font-weight: 700; transition: 0.2s; }
    .m-btn.active { background: var(--card-bg); color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

    .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    .smart-info { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 12px; font-weight: 600; padding: 0 5px; }
    
    .stats-box { background: rgba(18, 184, 134, 0.1); border: 1px solid var(--success); padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: center; display: none; }
    .stats-box p { color: var(--success); font-size: 13px; font-weight: 700; }

    .action-btns { display: flex; gap: 10px; margin-top: 15px; }
    .btn-success { background: var(--success); flex: 1.5; padding: 14px; border-radius: 12px; color: white; font-weight: 700; border: none; cursor: pointer; }
    .btn-danger { background: var(--danger); flex: 1; padding: 14px; border-radius: 12px; color: white; font-weight: 700; border: none; cursor: pointer; }

    .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; text-decoration: none; font-size: 30px; }
    footer { width: 100%; background: var(--card-bg); padding: 25px; text-align: center; border-top: 1px solid var(--border); margin-top: auto; }
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #222; border: 1px solid var(--primary); color: white; padding: 12px 30px; border-radius: 50px; display: none; z-index: 10000; font-size: 14px; font-weight: 700; }
    
    .drop-box { background: rgba(13, 110, 253, 0.05); border: 2px dashed var(--border); padding: 40px; border-radius: 15px; text-align: center; margin-bottom: 20px; cursor: pointer; }
</style>
</head>
<body>

<div id="loader"><img src="logo.ico" alt="Loading"></div>

<header>
    <a href="https://smmxhero.com" class="logo-area">
        <img src="logo.ico" alt="Logo">
        <span>SMMX<b>HERO</b></span>
    </a>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 الوضع الليلي</button>
</header>

<div class="dashboard" id="main" style="display:none;">
    <div class="tabs-header">
        <button class="tab-btn active" id="tab1" onclick="openTab('massTab')">📦 تنسيق الطلبات</button>
        <button class="tab-btn" id="tab2" onclick="openTab('filterTab')">🔍 استخراج الأرقام</button>
    </div>

    <!-- الأداة الأولى: تنسيق الطلبات (المحدثة) -->
    <div id="massTab" class="tab-content active">
        <label>نظام التنسيق:</label>
        <div class="mode-selector">
            <button class="m-btn active" id="mFixed" onclick="updateMassMode('fixed')">خدمة ثابتة</button>
            <button class="m-btn" id="mRandom" onclick="updateMassMode('random')">كمية عشوائية</button>
            <button class="m-btn" id="mAdvanced" onclick="updateMassMode('advanced')">خدمات متنوعة</button>
        </div>

        <div id="massDynamicInputs">
            <div class="input-group" style="display: flex; gap: 12px;" id="massMainGroup">
                <div style="flex: 1.2;" id="svcWrap">
                    <label>رقم الخدمة (Service ID)</label>
                    <input type="text" id="massService" class="form-control" placeholder="101" oninput="saveS()">
                </div>
                <div style="flex: 1;" id="qtyWrap">
                    <label>الكمية</label>
                    <input type="number" id="massQty" class="form-control" placeholder="1000">
                </div>
            </div>

            <div id="massRndGroup" style="display: none; gap: 12px; margin-bottom: 20px;">
                <div style="flex: 1;">
                    <label>أقل كمية</label>
                    <input type="number" id="massMin" class="form-control" placeholder="50">
                </div>
                <div style="flex: 1;">
                    <label>أكبر كمية</label>
                    <input type="number" id="massMax" class="form-control" placeholder="200">
                </div>
            </div>
        </div>

        <label>روابط الطلبات</label>
        <textarea id="massLinks" class="form-control" rows="6" placeholder="الصق الروابط هنا..." oninput="detectPlatforms()"></textarea>
        
        <div class="smart-info">
            <span id="linkCounterLabel">الروابط: 0</span>
            <span id="platformDetect">المنصة: لم يتم التحديد</span>
        </div>

        <button class="btn-main" onclick="runMassFormatter()">🚀 إنشاء الطلبات الجماعية</button>
        <div id="massStatsBox" class="stats-box"><p id="massStats"></p></div>
        <textarea id="massResult" class="form-control" rows="5" readonly placeholder="التنسيق الجاهز..."></textarea>

        <div class="action-btns">
            <button class="btn-success" onclick="copyAndRedirect('massResult')">📋 نسخ والذهاب للموقع</button>
            <button class="btn-danger" onclick="clearMass()">🗑️ مسح</button>
        </div>
    </div>

    <!-- الأداة الثانية: استخراج الأرقام (بدون تغيير) -->
    <div id="filterTab" class="tab-content">
        <div class="mode-selector">
            <button class="m-btn active" id="btnManual" onclick="switchFilterMode('manual')">⌨️ يدوي</button>
            <button class="m-btn" id="btnImage" onclick="switchFilterMode('image')">📷 من صورة</button>
        </div>
        <div id="filterImageSection" style="display: none;">
            <div class="drop-box" id="filterDropZone">
                <strong>📸 اسحب الصورة أو اضغط</strong>
                <input type="file" id="filterImgInput" accept="image/*" style="display:none">
            </div>
            <div id="filterOcrStatus" style="text-align:center; color:#facc15; font-size:12px; margin-bottom:15px; display:none;">⏳ جاري التحليل...</div>
        </div>
        <label>النص المراد تنظيفه:</label>
        <textarea id="filterInput" class="form-control" rows="6" placeholder="الصق النص هنا..."></textarea>
        <div style="display: flex; gap: 12px;">
            <div style="flex: 1;"><label>تصفية حسب</label><select id="filterType" class="form-control"><option value="id">رقم الطلب</option><option value="all">كل الأرقام</option></select></div>
            <div style="flex: 1;"><label>الفاصل</label><select id="filterSep" class="form-control"><option value="&#10;">سطر جديد</option><option value=",">فاصلة</option></select></div>
        </div>
        <button class="btn-main" onclick="runFilter()">⚡ استخراج الأرقام</button>
        <div id="filterStatsBox" class="stats-box"><p id="filterStats"></p></div>
        <textarea id="filterResult" class="form-control" rows="5" readonly></textarea>
        <div class="action-btns">
            <button class="btn-success" onclick="copyValue('filterResult')">📋 نسخ</button>
            <button class="btn-danger" onclick="clearFilter()">🗑️ مسح</button>
        </div>
    </div>
</div>

<a href="https://wa.me/201159017393" class="whatsapp-float" target="_blank">📞</a>

<footer><p>© 2026 جميع الحقوق محفوظة لـ <a href="https://smmxhero.com">SMMXHERO.COM</a></p></footer>
<div class="toast" id="toast">تم النسخ ✅</div>

<script>
let currentMode = 'fixed';

function updateMassMode(mode) {
    currentMode = mode;
    document.querySelectorAll('#massTab .m-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('m' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');

    const svcWrap = document.getElementById('svcWrap');
    const qtyWrap = document.getElementById('qtyWrap');
    const rndGroup = document.getElementById('massRndGroup');
    const linksArea = document.getElementById('massLinks');

    if(mode === 'fixed') {
        svcWrap.style.display = 'block'; qtyWrap.style.display = 'block'; rndGroup.style.display = 'none';
        linksArea.placeholder = "الصق الروابط هنا (رابط في كل سطر)...";
    } else if(mode === 'random') {
        svcWrap.style.display = 'block'; qtyWrap.style.display = 'none'; rndGroup.style.display = 'flex';
        linksArea.placeholder = "الصق الروابط هنا (رابط في كل سطر)...";
    } else {
        svcWrap.style.display = 'none'; qtyWrap.style.display = 'none'; rndGroup.style.display = 'none';
        linksArea.placeholder = "التنسيق: الرابط | الخدمة | الكمية\nمثال:\nhttps://insta.com/p/1 | 101 | 500";
    }
}

function runMassFormatter() {
    const svc = document.getElementById("massService").value.trim();
    const links = document.getElementById("massLinks").value.split('\n');
    const qty = document.getElementById("massQty").value;
    const min = parseInt(document.getElementById("massMin").value);
    const max = parseInt(document.getElementById("massMax").value);
    
    let res = ""; let count = 0;

    links.forEach(l => {
        if(l.trim() === "") return;
        if(currentMode === 'advanced') {
            let parts = l.split('|').map(p => p.trim());
            if(parts.length >= 3) { res += `${parts[1]} | ${parts[0]} | ${parts[2]}\n`; count++; }
        } else {
            const url = l.trim().match(/(https?:\/\/[^\s]+)/i);
            if(url && svc) {
                let finalQty = (currentMode === 'random') ? Math.floor(Math.random()*(max-min+1))+min : qty;
                res += `${svc} | ${url[0]} | ${finalQty}\n`; count++;
            }
        }
    });

    document.getElementById("massResult").value = res.trim();
    document.getElementById("massStatsBox").style.display = "block";
    document.getElementById("massStats").innerText = `✨ تم تنسيق ${count} طلب بنجاح!`;
}

// الوظائف العامة والأداة الثانية
function toggleTheme() {
    const body = document.body;
    body.classList.toggle("light-mode");
    const isLight = body.classList.contains("light-mode");
    document.getElementById("themeBtn").innerText = isLight ? "☀️ الوضع النهاري" : "🌙 الوضع الليلي";
    localStorage.setItem("theme", isLight ? "light" : "dark");
}

function openTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

function detectPlatforms() {
    const text = document.getElementById("massLinks").value.toLowerCase();
    const count = text.split('\n').filter(l => l.trim() !== "").length;
    document.getElementById("linkCounterLabel").innerText = `الروابط: ${count}`;
}

async function copyAndRedirect(id) {
    const val = document.getElementById(id).value;
    if(!val) return;
    await navigator.clipboard.writeText(val);
    showToast("📋 تم النسخ! جارٍ التوجيه...");
    setTimeout(() => { window.open("https://smmxhero.com/orders", "_blank"); }, 1200);
}

function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg; t.style.display = "block";
    setTimeout(()=> t.style.display="none", 2500);
}

// وظائف الأداة الثانية (فلترة الأرقام)
function runFilter() {
    const input = document.getElementById("filterInput").value;
    const type = document.getElementById("filterType").value;
    const sep = document.getElementById("filterSep").value;
    let nums = input.match(/\d+/g);
    if(!nums) { showToast("⚠️ لا توجد أرقام"); return; }
    let filtered = (type === "id") ? nums.filter(n => n.length >= 5) : nums;
    let unique = [...new Set(filtered)];
    document.getElementById("filterResult").value = unique.join(sep);
    document.getElementById("filterStatsBox").style.display = "block";
    document.getElementById("filterStats").innerText = `✅ تم استخراج ${unique.length} رقم.`;
}

function switchFilterMode(mode) {
    const isImg = mode === 'image';
    document.getElementById("filterImageSection").style.display = isImg ? "block" : "none";
}

window.onload = () => {
    if(localStorage.getItem("theme") === "light") toggleTheme();
    setTimeout(() => { 
        document.getElementById("loader").style.display = "none";
        document.getElementById("main").style.display = "block"; 
    }, 600);
};

function clearMass() { document.getElementById("massLinks").value = ""; document.getElementById("massResult").value = ""; }
function clearFilter() { document.getElementById("filterInput").value = ""; document.getElementById("filterResult").value = ""; }
function copyValue(id) { navigator.clipboard.writeText(document.getElementById(id).value); showToast("تم النسخ ✅"); }
</script>
</body>
</html>
