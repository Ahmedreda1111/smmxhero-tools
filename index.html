<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMMXHERO | Smart Dashboard</title>
<link rel="icon" href="logo.ico">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
    :root {
        --primary: #0d6efd;
        --success: #12b886;
        --danger: #fa5252;
        --bg-dark: #1a1b1e;
        --card-bg: #25262b;
        --border: #373a40;
        --text-main: #e5e7eb;
        --text-dim: #909296;
        --input-bg: #141517;
    }

    .light-mode {
        --bg-dark: #f8f9fa;
        --card-bg: #ffffff;
        --border: #dee2e6;
        --text-main: #212529;
        --text-dim: #6c757d;
        --input-bg: #f1f3f5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 0; display: flex; flex-direction: column; align-items: center; transition: all 0.3s ease; }

    #loader { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: 0.5s; }
    #loader img { width: 80px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } }

    header { width: 100%; background: var(--card-bg); padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .logo-area { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-area img { width: 35px; height: 35px; border-radius: 50%; }
    .logo-area span { color: var(--text-main); font-size: 20px; font-weight: 800; }
    .logo-area span b { color: var(--primary); }

    .header-actions { display: flex; gap: 10px; }
    .theme-toggle, .lang-toggle { background: var(--border); border: none; padding: 8px 15px; border-radius: 50px; cursor: pointer; color: var(--text-main); font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; transition: 0.3s; }

    .dashboard { width: 100%; max-width: 800px; padding: 20px; flex: 1; }

    .tabs-header { display: flex; gap: 10px; margin-bottom: 25px; background: var(--card-bg); padding: 6px; border-radius: 15px; border: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 12px; font-weight: 700; transition: 0.3s; }
    .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3); }

    .tab-content { display: none; background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 30px; animation: slideUp 0.4s ease; }
    .tab-content.active { display: block; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    label { display: block; margin-bottom: 10px; font-size: 13px; font-weight: 600; color: var(--text-dim); }
    .form-control { width: 100%; margin-bottom: 15px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text-main); font-size: 14px; outline: none; transition: 0.3s; }
    .form-control:focus { border-color: var(--primary); }

    .mode-selector { display: flex; background: var(--input-bg); padding: 5px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); gap: 5px; }
    .m-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 10px; font-size: 12px; font-weight: 700; transition: 0.2s; }
    .m-btn.active { background: var(--card-bg); color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

    .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    
    .stats-box { background: rgba(18, 184, 134, 0.1); border: 1px solid var(--success); padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: center; display: none; }
    .stats-box p { color: var(--success); font-size: 13px; font-weight: 700; }

    .action-btns { display: flex; gap: 10px; margin-top: 15px; }
    .btn-success { background: var(--success); flex: 1.5; padding: 14px; border-radius: 12px; color: white; font-weight: 700; border: none; cursor: pointer; }
    .btn-danger { background: var(--danger); flex: 1; padding: 14px; border-radius: 12px; color: white; font-weight: 700; border: none; cursor: pointer; }

    .orders-basket { background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; max-height: 200px; overflow-y: auto; display: none; }
    .basket-item { padding: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .basket-item:last-child { border-bottom: none; }
    .basket-item span { color: var(--text-dim); }
    .basket-item b { color: var(--primary); }
    .remove-order { color: var(--danger); cursor: pointer; font-size: 18px; padding: 0 10px; }

    .drop-box { background: rgba(13, 110, 253, 0.05); border: 2px dashed var(--border); padding: 40px; border-radius: 15px; text-align: center; margin-bottom: 20px; cursor: pointer; }
    .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; text-decoration: none; font-size: 30px; }
    footer { width: 100%; background: var(--card-bg); padding: 25px; text-align: center; border-top: 1px solid var(--border); margin-top: auto; }
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #222; border: 1px solid var(--primary); color: white; padding: 12px 30px; border-radius: 50px; display: none; z-index: 10000; font-size: 14px; font-weight: 700; }

    /* CSS للتعامل مع اتجاه الصفحة عند تغيير اللغة */
    body.en { direction: ltr; }
    body.ar { direction: rtl; }
</style>
</head>
<body class="ar">

<div id="loader"><img src="logo.ico" alt="Loading"></div>

<header>
    <a href="https://smmxhero.com" class="logo-area">
        <img src="logo.ico" alt="Logo">
        <span>SMMX<b>HERO</b></span>
    </a>
    <div class="header-actions">
        <button class="lang-toggle" onclick="toggleLanguage()" id="langBtn">🌐 English</button>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 الوضع الليلي</button>
    </div>
</header>

<div class="dashboard" id="main" style="display:none;">
    
    <div class="tabs-header">
        <button class="tab-btn active" id="btnTabMass" onclick="openTab('massTab')" data-lang="tab_mass">📦 تنسيق الطلبات</button>
        <button class="tab-btn" id="btnTabFilter" onclick="openTab('filterTab')" data-lang="tab_filter">🔍 استخراج الأرقام</button>
    </div>

    <!-- الأداة الأولى: تنسيق الطلبات -->
    <div id="massTab" class="tab-content active">
        <label data-lang="format_system">نظام التنسيق:</label>
        <div class="mode-selector">
            <button class="m-btn active" id="mFixed" onclick="updateMassUI('fixed')" data-lang="mode_fixed">خدمة ثابتة</button>
            <button class="m-btn" id="mRandom" onclick="updateMassUI('random')" data-lang="mode_random">كمية عشوائية</button>
            <button class="m-btn" id="mAdvanced" onclick="updateMassUI('advanced')" data-lang="mode_advanced">خدمات متنوعة</button>
        </div>

        <div id="massInputSection">
            <div id="standardInputs" class="input-group" style="display: flex; gap: 12px;">
                <div style="flex: 1.2;" id="svcWrap">
                    <label data-lang="service_id">رقم الخدمة (Service ID)</label>
                    <input type="text" id="massService" class="form-control" placeholder="101">
                </div>
                <div style="flex: 1;" id="qtyWrap">
                    <label data-lang="quantity">الكمية</label>
                    <input type="number" id="massQty" class="form-control" placeholder="1000">
                </div>
            </div>

            <div id="rndInputs" style="display: none; gap: 12px; margin-bottom: 20px;">
                <div style="flex: 1;">
                    <label data-lang="min_qty">أقل كمية</label>
                    <input type="number" id="massMin" class="form-control" placeholder="50">
                </div>
                <div style="flex: 1;">
                    <label data-lang="max_qty">أكبر كمية</label>
                    <input type="number" id="massMax" class="form-control" placeholder="200">
                </div>
            </div>

            <div id="linkSingleWrap">
                <label id="linkLabel" data-lang="link">الرابط</label>
                <input type="text" id="massSingleLink" class="form-control" placeholder="...">
            </div>

            <button id="addOrderBtn" class="btn-main" style="display: none; background: var(--success); margin-bottom: 20px;" onclick="addOrderToBasket()" data-lang="add_to_list">➕ إضافة الطلب للقائمة</button>
            
            <div id="orderBasket" class="orders-basket"></div>

            <div id="bulkLinksWrap">
                <label data-lang="bulk_links">أو الصق مجموعة روابط (رابط في كل سطر)</label>
                <textarea id="massLinksBulk" class="form-control" rows="4" placeholder="Link 1..."></textarea>
            </div>
        </div>

        <button class="btn-main" onclick="runMassFormatter()" data-lang="generate_btn">🚀 إنشاء التنسيق النهائي</button>
        
        <div id="massStatsBox" class="stats-box"><p id="massStats"></p></div>
        <textarea id="massResult" class="form-control" rows="5" readonly placeholder="..."></textarea>

        <div class="action-btns">
            <button class="btn-success" onclick="copyAndRedirect('massResult')" data-lang="copy_go">📋 نسخ والذهاب للموقع</button>
            <button class="btn-danger" onclick="clearMass()" data-lang="clear_all">🗑️ مسح الكل</button>
        </div>
    </div>

    <!-- الأداة الثانية: استخراج الأرقام -->
    <div id="filterTab" class="tab-content">
        <div class="mode-selector">
            <button class="m-btn active" id="btnManual" onclick="switchFilterMode('manual')" data-lang="filter_manual">⌨️ يدوي</button>
            <button class="m-btn" id="btnImage" onclick="switchFilterMode('image')" data-lang="filter_image">📷 من صورة</button>
        </div>
        <div id="filterImageSection" style="display: none;">
            <div class="drop-box" id="filterDropZone">
                <strong data-lang="drop_box">📸 اسحب الصورة أو اضغط</strong>
                <input type="file" id="filterImgInput" accept="image/*" style="display:none">
            </div>
            <div id="filterOcrStatus" style="text-align:center; color:#facc15; font-size:12px; margin-bottom:15px; display:none;" data-lang="analyzing">⏳ جاري التحليل...</div>
        </div>
        <label data-lang="text_to_clean">النص المراد تنظيفه:</label>
        <textarea id="filterInput" class="form-control" rows="6" placeholder="..."></textarea>
        <button class="btn-main" onclick="runFilter()" data-lang="extract_btn">⚡ استخراج الأرقام</button>
        <textarea id="filterResult" class="form-control" rows="5" readonly></textarea>
        <div class="action-btns">
            <button class="btn-success" onclick="copyValue('filterResult')" data-lang="copy">📋 نسخ</button>
            <button class="btn-danger" onclick="clearFilter()" data-lang="clear">🗑️ مسح</button>
        </div>
    </div>
</div>

<a href="https://wa.me/201159017393" class="whatsapp-float" target="_blank">📞</a>
<footer id="footerText"><p>© 2026 جميع الحقوق محفوظة لـ <a href="https://smmxhero.com">SMMXHERO.COM</a></p></footer>
<div class="toast" id="toast">تم النسخ ✅</div>

<script>
// --- كود الترجمة ---
const translations = {
    ar: {
        tab_mass: "📦 تنسيق الطلبات",
        tab_filter: "🔍 استخراج الأرقام",
        format_system: "نظام التنسيق:",
        mode_fixed: "خدمة ثابتة",
        mode_random: "كمية عشوائية",
        mode_advanced: "خدمات متنوعة",
        service_id: "رقم الخدمة (Service ID)",
        quantity: "الكمية",
        min_qty: "أقل كمية",
        max_qty: "أكبر كمية",
        link: "الرابط",
        add_to_list: "➕ إضافة الطلب للقائمة",
        bulk_links: "أو الصق مجموعة روابط (رابط في كل سطر)",
        generate_btn: "🚀 إنشاء التنسيق النهائي",
        copy_go: "📋 نسخ والذهاب للموقع",
        clear_all: "🗑️ مسح الكل",
        filter_manual: "⌨️ يدوي",
        filter_image: "📷 من صورة",
        drop_box: "📸 اسحب الصورة أو اضغط",
        analyzing: "⏳ جاري التحليل...",
        text_to_clean: "النص المراد تنظيفه:",
        extract_btn: "⚡ استخراج الأرقام",
        copy: "📋 نسخ",
        clear: "🗑️ مسح",
        theme_dark: "🌙 الوضع الليلي",
        theme_light: "☀️ الوضع النهاري",
        lang_btn: "🌐 English",
        toast_copied: "تم النسخ ✅",
        toast_empty: "⚠️ لا توجد بيانات",
        footer: "© 2026 جميع الحقوق محفوظة لـ"
    },
    en: {
        tab_mass: "📦 Mass Format",
        tab_filter: "🔍 Numbers Extractor",
        format_system: "Format System:",
        mode_fixed: "Fixed Service",
        mode_random: "Random Qty",
        mode_advanced: "Advanced Mode",
        service_id: "Service ID",
        quantity: "Quantity",
        min_qty: "Min Qty",
        max_qty: "Max Qty",
        link: "Link",
        add_to_list: "➕ Add Order to List",
        bulk_links: "Or paste multiple links (one per line)",
        generate_btn: "🚀 Generate Format",
        copy_go: "📋 Copy & Go to Site",
        clear_all: "🗑️ Clear All",
        filter_manual: "⌨️ Manual",
        filter_image: "📷 Image OCR",
        drop_box: "📸 Drag image or click",
        analyzing: "⏳ Analyzing...",
        text_to_clean: "Text to clean:",
        extract_btn: "⚡ Extract Numbers",
        copy: "📋 Copy",
        clear: "🗑️ Clear",
        theme_dark: "🌙 Dark Mode",
        theme_light: "☀️ Light Mode",
        lang_btn: "🌐 العربية",
        toast_copied: "Copied ✅",
        toast_empty: "⚠️ No data found",
        footer: "© 2026 All Rights Reserved to"
    }
};

let currentLang = localStorage.getItem("lang") || "ar";

function toggleLanguage() {
    currentLang = currentLang === "ar" ? "en" : "ar";
    localStorage.setItem("lang", currentLang);
    applyLanguage();
}

function applyLanguage() {
    const texts = translations[currentLang];
    document.body.className = currentLang === "en" ? "en" : "ar";
    document.documentElement.dir = currentLang === "en" ? "ltr" : "rtl";
    document.documentElement.lang = currentLang;

    // ترجمة العناصر التي تحمل data-lang
    document.querySelectorAll("[data-lang]").forEach(el => {
        const key = el.getAttribute("data-lang");
        if (texts[key]) el.innerText = texts[key];
    });

    // تحديث الأزرار والفوتر
    document.getElementById("langBtn").innerText = texts.lang_btn;
    const isLight = document.body.classList.contains("light-mode");
    document.getElementById("themeBtn").innerText = isLight ? texts.theme_light : texts.theme_dark;
    
    document.getElementById("footerText").innerHTML = `<p>${texts.footer} <a href="https://smmxhero.com">SMMXHERO.COM</a></p>`;
}

// --- بقية الأكواد (معدلة قليلاً لتدعم التغيير) ---
let currentMode = 'fixed';
let basketOrders = [];

function updateMassUI(mode) {
    currentMode = mode;
    document.querySelectorAll('#massTab .m-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('m' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');

    const svcWrap = document.getElementById('svcWrap');
    const qtyWrap = document.getElementById('qtyWrap');
    const rndInputs = document.getElementById('rndInputs');
    const bulkWrap = document.getElementById('bulkLinksWrap');
    const addBtn = document.getElementById('addOrderBtn');
    const basket = document.getElementById('orderBasket');

    if(mode === 'fixed') {
        svcWrap.style.display = 'block'; qtyWrap.style.display = 'block'; rndInputs.style.display = 'none'; bulkWrap.style.display = 'block'; addBtn.style.display = 'none'; basket.style.display = 'none';
    } else if(mode === 'random') {
        svcWrap.style.display = 'block'; qtyWrap.style.display = 'none'; rndInputs.style.display = 'flex'; bulkWrap.style.display = 'block'; addBtn.style.display = 'none'; basket.style.display = 'none';
    } else {
        svcWrap.style.display = 'block'; qtyWrap.style.display = 'block'; rndInputs.style.display = 'none'; bulkWrap.style.display = 'none'; addBtn.style.display = 'block'; basket.style.display = (basketOrders.length > 0 ? 'block' : 'none');
    }
}

function addOrderToBasket() {
    const svc = document.getElementById('massService').value.trim();
    const qty = document.getElementById('massQty').value.trim();
    const link = document.getElementById('massSingleLink').value.trim();
    if(!svc || !qty || !link) { showToast(currentLang === 'ar' ? "⚠️ املأ البيانات" : "⚠️ Fill all data"); return; }
    basketOrders.push({ svc, qty, link });
    renderBasket();
    document.getElementById('massSingleLink').value = "";
    showToast(currentLang === 'ar' ? "✅ تمت الإضافة" : "✅ Added");
}

function renderBasket() {
    const container = document.getElementById('orderBasket');
    container.innerHTML = "";
    if(basketOrders.length > 0) {
        container.style.display = 'block';
        basketOrders.forEach((o, i) => {
            container.innerHTML += `<div class="basket-item"><div><b>#${o.svc}</b> | ${o.link.substring(0,20)}... | <b>${o.qty}</b></div><div class="remove-order" onclick="removeOrder(${i})">✕</div></div>`;
        });
    } else container.style.display = 'none';
}

function removeOrder(i) { basketOrders.splice(i, 1); renderBasket(); }

function runMassFormatter() {
    let result = "";
    let count = 0;
    if(currentMode === 'advanced') {
        basketOrders.forEach(o => { result += `${o.svc} | ${o.link} | ${o.qty}\n`; count++; });
    } else {
        const svc = document.getElementById('massService').value.trim();
        const qty = document.getElementById('massQty').value;
        const bulk = document.getElementById('massLinksBulk').value.split('\n');
        const single = document.getElementById('massSingleLink').value.trim();
        const min = parseInt(document.getElementById('massMin').value);
        const max = parseInt(document.getElementById('massMax').value);
        const allLinks = bulk.filter(l => l.trim() !== "");
        if(single) allLinks.unshift(single);
        allLinks.forEach(l => {
            let finalQty = (currentMode === 'random') ? Math.floor(Math.random()*(max-min+1))+min : qty;
            result += `${svc} | ${l.trim()} | ${finalQty}\n`;
            count++;
        });
    }
    document.getElementById('massResult').value = result.trim();
    document.getElementById('massStatsBox').style.display = 'block';
    const msg = currentLang === 'ar' ? `✨ تم تنسيق ${count} طلب!` : `✨ Formatted ${count} orders!`;
    document.getElementById('massStats').innerText = msg;
}

function toggleTheme() {
    document.body.classList.toggle("light-mode");
    const isLight = document.body.classList.contains("light-mode");
    const texts = translations[currentLang];
    document.getElementById("themeBtn").innerText = isLight ? texts.theme_light : texts.theme_dark;
    localStorage.setItem("theme", isLight ? "light" : "dark");
}

function openTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById(id === 'massTab' ? 'btnTabMass' : 'btnTabFilter').classList.add('active');
}

function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg; t.style.display = "block";
    setTimeout(()=> t.style.display="none", 2500);
}

function runFilter() {
    const input = document.getElementById("filterInput").value;
    let nums = input.match(/\d+/g);
    if(!nums) { showToast(translations[currentLang].toast_empty); return; }
    document.getElementById("filterResult").value = [...new Set(nums)].join(',');
}

function switchFilterMode(mode) {
    document.getElementById("filterImageSection").style.display = (mode === 'image') ? "block" : "none";
}

window.onload = () => {
    applyLanguage(); // تطبيق اللغة المحفوظة أولاً
    if(localStorage.getItem("theme") === "light") document.body.classList.add("light-mode");
    setTimeout(() => { 
        document.getElementById("loader").style.display = "none"; 
        document.getElementById("main").style.display = "block"; 
    }, 600);
};

function clearMass() { basketOrders = []; renderBasket(); document.getElementById('massResult').value = ""; }
function clearFilter() { document.getElementById('filterInput').value = ""; document.getElementById('filterResult').value = ""; }
function copyValue(id) { navigator.clipboard.writeText(document.getElementById(id).value); showToast(translations[currentLang].toast_copied); }
async function copyAndRedirect(id) {
    const val = document.getElementById(id).value;
    if(!val) return;
    await navigator.clipboard.writeText(val);
    showToast(currentLang === 'ar' ? "📋 تم النسخ! جارٍ التوجيه..." : "📋 Copied! Redirecting...");
    setTimeout(() => { window.open("https://smmxhero.com/orders", "_blank"); }, 1200);
}
</script>
</body>
</html>
