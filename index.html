<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMMXHERO | All-in-One Tool</title>

<link rel="icon" href="logo.ico">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
    :root {
        --primary: #0d6efd;
        --success: #198754;
        --danger: #dc3545;
        --bg-dark: #1a1b1e;
        --card-bg: #25262b;
        --border: #373a40;
        --text-main: #e5e7eb;
        --text-dim: #909296;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 20px; display: flex; justify-content: center; }

    #loader { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    #loader img { width: 80px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } }

    .dashboard { width: 100%; max-width: 800px; }

    /* التبويبات Tabs */
    .tabs-header { display: flex; gap: 10px; margin-bottom: 20px; background: var(--card-bg); padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 8px; font-weight: 600; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .tab-btn.active { background: var(--primary); color: white; }
    .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.05); }

    .tab-content { display: none; background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.3); animation: fadeIn 0.4s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .brand-title { text-align: center; margin-bottom: 25px; font-size: 22px; font-weight: 700; color: var(--text-main); }

    /* العناصر المشتركة */
    label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-dim); }
    .form-control { width: 100%; margin-bottom: 15px; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); background: #141517; color: #c1c2c5; font-size: 14px; outline: none; transition: 0.2s; }
    .form-control:focus { border-color: var(--primary); }
    .input-group { display: flex; gap: 15px; width: 100%; }
    button { width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
    
    .btn-main { background: var(--primary); color: white; margin-bottom: 15px; }
    .btn-main:hover { background: #0b5ed7; }
    
    .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }

    /* قسم OCR */
    .ocr-drop-zone { background: rgba(13, 110, 253, 0.05); border: 2px dashed var(--border); padding: 30px; border-radius: 10px; text-align: center; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
    .ocr-drop-zone.dragover { border-color: var(--primary); background: rgba(13, 110, 253, 0.15); }
    
    #status { font-size: 13px; color: #facc15; text-align: center; margin-bottom: 10px; display: none; }
    .stats-text { text-align: center; color: var(--success); font-size: 14px; font-weight: 600; margin: 15px 0; }

    .counter-info { display: flex; justify-content: space-between; margin-top: -10px; margin-bottom: 15px; font-size: 12px; }

    .toast { position: fixed; bottom: 20px; left: 20px; background: var(--success); color: white; padding: 12px 25px; border-radius: 8px; display: none; z-index: 10000; }
</style>
</head>
<body>

<div id="loader"><img src="logo.ico" alt="Loading"></div>

<div class="dashboard" id="main" style="display:none;">
    
    <div class="tabs-header">
        <button class="tab-btn active" onclick="openTab('massOrder')">📝 الطلبات الجماعية</button>
        <button class="tab-btn" onclick="openTab('ocrTool')">📷 استخراج من الصور</button>
    </div>

    <div id="massOrder" class="tab-content active">
        <div class="brand-title">SMMXHERO | مُنسّق الطلبات الجماعية</div>
        
        <div class="input-group">
            <div style="flex: 1;">
                <label>رقم الخدمة (Service ID)</label>
                <input type="text" id="service" class="form-control" placeholder="مثال: 101">
            </div>
            <div style="flex: 1;" id="fixedQtyGroup">
                <label>الكمية (Quantity)</label>
                <input type="number" id="quantity" class="form-control" placeholder="مثال: 1000">
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="cursor:pointer; display: flex; align-items:center; gap:8px; font-size: 13px;">
                <input type="checkbox" id="randomToggle" onchange="toggleRandomMode()"> توزيع عشوائي (تجنب الحظر)
            </label>
        </div>

        <div id="randomQtyGroup" class="input-group" style="display:none;">
            <div style="flex: 1;">
                <label>أقل كمية</label>
                <input type="number" id="minQty" class="form-control" placeholder="50">
            </div>
            <div style="flex: 1;">
                <label>أكبر كمية</label>
                <input type="number" id="maxQty" class="form-control" placeholder="150">
            </div>
        </div>

        <label>روابط الطلبات</label>
        <textarea id="links" class="form-control" rows="5" placeholder="ضع الروابط هنا..."></textarea>
        <div class="counter-info">
            <span id="linkCount" style="color: var(--success); font-weight: bold;">الروابط: 0</span>
            <span>رابط واحد في كل سطر</span>
        </div>

        <button class="btn-main" onclick="generateMass()">⚡ توليد الطلبات</button>
        
        <div id="massStats" class="stats-text"></div>
        <textarea id="massResult" class="form-control" rows="5" readonly placeholder="النتيجة جاهزة للنسخ..."></textarea>

        <div class="action-buttons">
            <button class="btn-success" onclick="copyText('massResult')">📋 نسخ</button>
            <button class="btn-danger" onclick="clearMass()">🗑️ مسح</button>
        </div>
    </div>

    <div id="ocrTool" class="tab-content">
        <div class="brand-title">SMMXHERO | استخراج الأرقام من الصور</div>

        <div class="ocr-drop-zone" id="dropZone">
            <strong>📷 اسحب الصورة هنا أو اضغط للاختيار</strong>
            <p>يدعم اللصق المباشر Ctrl + V من الشاشة</p>
            <input type="file" id="imageInput" accept="image/*" style="display:none">
        </div>

        <div id="status">⏳ جاري معالجة الصورة...</div>

        <div style="background: #1c1d21; padding: 10px; border-radius: 8px; margin-bottom: 15px;">
            <label style="cursor:pointer; display: flex; align-items:center; gap:8px; font-size: 12px;">
                <input type="checkbox" id="idFilter" checked> استخراج أرقام الـ ID فقط (5 خانات+)
            </label>
        </div>

        <label>النص الخام المستخرج</label>
        <textarea id="ocrInput" class="form-control" rows="3"></textarea>

        <button class="btn-main" onclick="convertOCR()">⚙️ تنظيف وتصفية الأرقام</button>
        
        <div id="ocrStats" class="stats-text"></div>
        <textarea id="ocrResult" class="form-control" rows="4" readonly placeholder="أرقام الطلبات الصافية..."></textarea>

        <div class="action-buttons">
            <button class="btn-success" onclick="copyText('ocrResult')">📋 نسخ</button>
            <button class="btn-danger" onclick="clearOCR()">🗑️ مسح</button>
        </div>
    </div>

</div>

<div class="toast" id="toast">تم النسخ بنجاح ✅</div>

<script>
// --- إدارة التبويبات ---
function openTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
}

window.onload = () => {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
        document.getElementById("main").style.display = "block";
    }, 600);
};

// --- منطق الطلبات الجماعية ---
const linksInp = document.getElementById("links");
linksInp.addEventListener("input", () => {
    const lines = linksInp.value.trim().split('\n').filter(l => l.trim() !== "");
    document.getElementById("linkCount").innerText = `الروابط: ${lines.length}`;
});

function toggleRandomMode() {
    const isRnd = document.getElementById("randomToggle").checked;
    document.getElementById("fixedQtyGroup").style.display = isRnd ? "none" : "block";
    document.getElementById("randomQtyGroup").style.display = isRnd ? "flex" : "none";
}

function generateMass() {
    const service = document.getElementById("service").value.replace(/\D/g, "");
    const links = linksInp.value.split('\n');
    const isRnd = document.getElementById("randomToggle").checked;
    const qty = document.getElementById("quantity").value;
    const min = parseInt(document.getElementById("minQty").value);
    const max = parseInt(document.getElementById("maxQty").value);

    if(!service || (!isRnd && !qty)) { alert("أكمل البيانات أولاً"); return; }

    let res = "";
    let count = 0;
    let seen = new Set();

    links.forEach(l => {
        const match = l.match(/(https?:\/\/[^\s]+)/i);
        if(match && !seen.has(match[0])) {
            seen.add(match[0]);
            let finalQty = isRnd ? Math.floor(Math.random()*(max-min+1))+min : qty;
            res += `${service} | ${match[0]} | ${finalQty}\n`;
            count++;
        }
    });

    document.getElementById("massResult").value = res.trim();
    document.getElementById("massStats").innerText = `✅ تم تجهيز ${count} طلب بنجاح.`;
}

// --- منطق OCR ---
const dropZone = document.getElementById('dropZone');
const imgInp = document.getElementById('imageInput');

dropZone.onclick = () => imgInp.click();
imgInp.onchange = (e) => handleImg(e.target.files[0]);

// السحب والإفلات
dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
dropZone.ondragleave = () => dropZone.classList.remove('dragover');
dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleImg(e.dataTransfer.files[0]); };

// اللصق
document.addEventListener('paste', e => {
    const item = e.clipboardData.items[0];
    if(item && item.type.includes('image')) handleImg(item.getAsFile());
});

async function handleImg(file) {
    if(!file) return;
    const status = document.getElementById("status");
    status.style.display = "block";
    try {
        const res = await Tesseract.recognize(file, 'eng');
        document.getElementById("ocrInput").value = res.data.text;
        status.innerText = "✅ اكتمل التحليل!";
        convertOCR();
        setTimeout(()=> status.style.display="none", 2000);
    } catch(e) { alert("خطأ في قراءة الصورة"); status.style.display="none"; }
}

function convertOCR() {
    const txt = document.getElementById("ocrInput").value;
    const filter = document.getElementById("idFilter").checked;
    let nums = txt.match(/\d+/g);
    if(!nums) return;
    let filtered = filter ? nums.filter(n => n.length >= 5) : nums;
    let unique = [...new Set(filtered)];
    document.getElementById("ocrResult").value = unique.join(", ");
    document.getElementById("ocrStats").innerText = `✅ تم استخراج ${unique.length} رقم.`;
}

// --- وظائف عامة ---
async function copyText(id) {
    const val = document.getElementById(id).value;
    if(!val) return;
    await navigator.clipboard.writeText(val);
    const t = document.getElementById("toast");
    t.style.display = "block";
    setTimeout(()=> t.style.display="none", 2000);
}

function clearMass() {
    document.getElementById("service").value = "";
    document.getElementById("links").value = "";
    document.getElementById("massResult").value = "";
    document.getElementById("massStats").innerText = "";
    document.getElementById("linkCount").innerText = "الروابط: 0";
}

function clearOCR() {
    document.getElementById("ocrInput").value = "";
    document.getElementById("ocrResult").value = "";
    document.getElementById("ocrStats").innerText = "";
}
</script>

</body>
</html>
