<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMMXHERO | Smart OCR Tool</title>

<link rel="icon" href="logo.ico">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
body { background: #1a1b1e; color: #e5e7eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

#loader { position: fixed; width: 100%; height: 100%; background: #1a1b1e; display: flex; justify-content: center; align-items: center; z-index: 9999; }
#loader img { width: 80px; animation: pulse 1.5s infinite; }
@keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.6; } }

.container { width: 100%; max-width: 600px; background: #25262b; padding: 30px; border-radius: 8px; border: 1px solid #373a40; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
.brand { text-align: center; color: #e5e7eb; margin-bottom: 20px; font-size: 20px; font-weight: 700; }

/* تم تحسين تصميم منطقة الرفع والسحب */
.ocr-section { 
    background: rgba(13, 110, 253, 0.05); 
    border: 2px dashed #373a40; 
    padding: 30px 15px; 
    border-radius: 8px; 
    text-align: center; 
    margin-bottom: 15px; 
    cursor: pointer; 
    transition: all 0.3s ease; 
}

.ocr-section.dragover { 
    background: rgba(13, 110, 253, 0.2); 
    border-color: #0d6efd; 
    transform: scale(1.02);
}

.ocr-section strong { color: #e5e7eb; display: block; margin-bottom: 5px; }
.ocr-section p { font-size: 13px; color: #909296; }

label { display: block; margin-bottom: 5px; font-size: 14px; color: #909296; }
.form-control { width: 100%; margin-bottom: 15px; padding: 12px 15px; border-radius: 6px; border: 1px solid #373a40; background: #141517; color: #c1c2c5; font-size: 14px; outline: none; }

#status { font-size: 12px; color: #facc15; margin-bottom: 10px; display: none; text-align: center;}
.stats-text { text-align: center; color: #12b886; font-size: 14px; font-weight: 600; margin: 10px 0; }

.btn-primary { width: 100%; padding: 12px; border: none; background: #0d6efd; color: white; font-weight: 600; border-radius: 6px; cursor: pointer; margin-bottom: 10px; }
.btn-primary:hover { background: #0b5ed7; }

.action-buttons { display: flex; gap: 10px; }
.btn-success { background: #198754; flex: 1; border: none; padding: 12px; color: white; border-radius: 6px; cursor: pointer; font-weight: 600; }
.btn-danger { background: #dc3545; flex: 1; border: none; padding: 12px; color: white; border-radius: 6px; cursor: pointer; font-weight: 600; }

.filter-settings { background: #1c1d21; padding: 10px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #373a40; }
.filter-settings span { font-size: 12px; color: #909296; display: block; margin-bottom: 5px; }

.toast { position: fixed; bottom: 20px; right: 20px; background: #198754; color: white; padding: 10px 20px; border-radius: 6px; display: none; font-size: 14px; z-index: 10001; }
</style>
</head>

<body>

<div id="loader"><img src="logo.ico" alt="Loading"></div>

<div class="container" id="main" style="display:none;">
    <div class="brand">SMMXHERO | مُستخرج الأرقام الذكي 📷</div>

    <div class="ocr-section" id="dropZone">
        <strong>📷 اسحب الصورة هنا أو اضغط للاختيار</strong>
        <p>يدعم اللصق المباشر Ctrl + V</p>
        <input type="file" id="imageInput" accept="image/*" style="display:none">
    </div>

    <div id="status">⏳ جاري تحليل الصورة...</div>

    <div class="filter-settings">
        <span>⚙️ إعدادات الفلترة:</span>
        <label style="display: inline-flex; align-items: center; gap: 10px; font-size: 12px; cursor: pointer;">
            <input type="checkbox" id="idLengthFilter" checked style="width:15px; height:15px;"> استخراج الأرقام الطويلة فقط (Order ID)
        </label>
    </div>

    <label>النص المستخرج</label>
    <textarea id="input" class="form-control" rows="4" placeholder="سيظهر النص هنا..."></textarea>

    <label>الفاصل المطلوب</label>
    <select id="separator" class="form-control">
        <option value=",">فاصلة ( , )</option>
        <option value="&#10;">سطر جديد</option>
    </select>

    <button class="btn-primary" onclick="convert()">⚡ تنظيف واستخراج يدوي</button>

    <div id="stats" class="stats-text"></div>

    <label>أرقام الطلبات المفلترة</label>
    <textarea id="result" class="form-control" rows="5" readonly placeholder="النتائج ستظهر هنا..."></textarea>

    <div class="action-buttons">
        <button class="btn-success" onclick="copy()">📋 نسخ النتيجة</button>
        <button class="btn-danger" onclick="clearAll()">🗑️ مسح</button>
    </div>
</div>

<div class="toast" id="toast">تم النسخ ✅</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('imageInput');

window.onload = () => {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
        document.getElementById("main").style.display = "block";
    }, 500);
};

// --- ميزة السحب والإدراج (Drag & Drop) ---

// منع السلوك الافتراضي للمتصفح عند سحب الملفات
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, e => {
        e.preventDefault();
        e.stopPropagation();
    }, false);
});

// إضافة تأثير بصري عند السحب فوق المربع
['dragenter', 'dragover'].forEach(eventName => {
    dropZone.addEventListener(eventName, () => {
        dropZone.classList.add('dragover');
    }, false);
});

['dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, () => {
        dropZone.classList.remove('dragover');
    }, false);
});

// معالجة الملف عند إلقائه (Drop)
dropZone.addEventListener('drop', e => {
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
        performOCR(file);
    }
});

// تشغيل اختيار الملف عند الضغط على المربع
dropZone.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', function() {
    if (this.files[0]) performOCR(this.files[0]);
});

// --- ميزة اللصق (Paste) ---
document.addEventListener('paste', e => {
    const items = (e.clipboardData || e.originalEvent.clipboardData).items;
    for (let item of items) {
        if (item.kind === 'file' && item.type.startsWith('image/')) {
            performOCR(item.getAsFile());
        }
    }
});

// --- معالجة OCR ---
async function performOCR(file) {
    const status = document.getElementById("status");
    const inputArea = document.getElementById("input");
    
    status.style.display = "block";
    status.innerText = "⏳ جاري القراءة ذكياً...";
    inputArea.value = "";

    try {
        const result = await Tesseract.recognize(file, 'eng');
        inputArea.value = result.data.text; 
        status.innerText = "✅ تم التحليل!";
        convert(); // تشغيل الفلترة تلقائياً
        setTimeout(() => status.style.display = "none", 3000);
    } catch (e) {
        alert("فشل في قراءة الصورة.");
        status.style.display = "none";
    }
}

function convert() {
    const input = document.getElementById("input").value;
    const separator = document.getElementById("separator").value;
    const useLengthFilter = document.getElementById("idLengthFilter").checked;
    
    let numbers = input.match(/\d+/g);
    if (!numbers) return;

    let filteredNumbers = useLengthFilter ? numbers.filter(num => num.length >= 5) : numbers;

    if (filteredNumbers.length === 0) {
        document.getElementById("stats").innerText = "⚠️ لم نجد أرقام طلبات (5+ أرقام)";
        return;
    }

    const uniqueNumbers = [...new Set(filteredNumbers)];
    document.getElementById("result").value = uniqueNumbers.join(separator);
    document.getElementById("stats").innerText = `✅ تم استخراج ${uniqueNumbers.length} رقم طلب.`;
}

async function copy() {
    const res = document.getElementById("result").value;
    if (!res) return;
    await navigator.clipboard.writeText(res);
    const t = document.getElementById("toast");
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 2000);
}

function clearAll() {
    document.getElementById("input").value = "";
    document.getElementById("result").value = "";
    document.getElementById("stats").innerText = "";
    fileInput.value = "";
    document.getElementById("status").style.display = "none";
}
</script>

</body>
</html>
